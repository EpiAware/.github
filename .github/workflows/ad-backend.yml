name: AD backend

on:
  workflow_call:
    inputs:
      name:
        description: 'Display name for the run (e.g. "Enzyme reverse")'
        required: true
        type: string
      tag:
        description: 'Test-item tag to select (e.g. enzyme_reverse)'
        required: true
        type: string
      flag:
        description: 'Codecov flag for this backend (e.g. ad-enzyme-reverse)'
        required: true
        type: string
      julia-version:
        description: 'Julia version to test on'
        required: false
        type: string
        default: '1'
      test_project:
        description: 'Project dir holding the AD suite and its runtests.jl'
        required: false
        type: string
        default: 'test/ad'
      coverage_directories:
        description: 'Directories to process for coverage (comma separated)'
        required: false
        type: string
        default: 'src,ext'
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  ad:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest
    # AD gradient compiles (esp. Enzyme) are the slowest legs; cap them so
    # a hung run is killed rather than holding a runner for hours.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - uses: julia-actions/cache@v3
      - name: Instantiate ${{ inputs.test_project }}
        run: >-
          julia --project=${{ inputs.test_project }}
          -e 'using Pkg; Pkg.instantiate()'
      - name: Run AD gradient tests
        run: |
          julia --project=${{ inputs.test_project }} --code-coverage=user \
            ${{ inputs.test_project }}/runtests.jl ${{ inputs.tag }}
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: ${{ inputs.coverage_directories }}
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          flags: ${{ inputs.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
