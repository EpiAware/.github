name: AD backend

# Reusable workflow: runs a package's shared AD gradient suite for a single
# automatic-differentiation backend, selected by test-item tag. Each
# backend is invoked by its own thin caller in the consuming repo so it
# gets its own status badge/check, while the test code stays in one place
# (EpiAware/CensoredDistributions.jl#269).
#
# The SET of backends/tags a package tests is package-specific and stays in
# the consuming repo as one thin caller per backend. This workflow is the
# generic per-backend runner those callers share.
#
# The suite is expected to live at `<test_project>/runtests.jl` and accept
# the tag as its first CLI argument (default `test/ad/runtests.jl`).

on:
  workflow_call:
    inputs:
      name:
        description: 'Display name for the run (e.g. "Enzyme reverse")'
        required: true
        type: string
      tag:
        description: 'Test-item tag to select (e.g. enzyme_reverse)'
        required: true
        type: string
      flag:
        description: 'Codecov flag for this backend (e.g. ad-enzyme-reverse)'
        required: true
        type: string
      julia-version:
        description: 'Julia version to test on'
        required: false
        type: string
        default: '1'
      test_project:
        description: 'Project dir holding the AD suite and its runtests.jl'
        required: false
        type: string
        default: 'test/ad'
      coverage_directories:
        description: 'Directories to process for coverage (comma separated)'
        required: false
        type: string
        default: 'src,ext'
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  ad:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - uses: julia-actions/cache@v3
      - name: Instantiate ${{ inputs.test_project }}
        run: >-
          julia --project=${{ inputs.test_project }}
          -e 'using Pkg; Pkg.instantiate()'
      # `--code-coverage=user` instruments `src/` and `ext/` (the package
      # is a path dependency of the AD project, so `.cov` files land next
      # to the source) so we can attribute which lines this backend
      # exercises.
      - name: Run AD gradient tests
        run: |
          julia --project=${{ inputs.test_project }} --code-coverage=user \
            ${{ inputs.test_project }}/runtests.jl ${{ inputs.tag }}
      # Walk the coverage directories explicitly. Each AD job runs a single
      # Julia version, so extension coverage attributes reproducibly
      # (EpiAware/CensoredDistributions.jl#252).
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: ${{ inputs.coverage_directories }}
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          flags: ${{ inputs.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
