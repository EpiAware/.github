name: AD

on:
  workflow_call:
    inputs:
      backends:
        description: >-
          JSON array of {name, tag, flag} objects, one per AD backend
        required: false
        type: string
        default: >-
          [{"name": "ForwardDiff", "tag": "forwarddiff",
            "flag": "ad-forwarddiff"},
           {"name": "ReverseDiff (tape)", "tag": "reversediff",
            "flag": "ad-reversediff"},
           {"name": "Mooncake forward", "tag": "mooncake_forward",
            "flag": "ad-mooncake-forward"},
           {"name": "Mooncake reverse", "tag": "mooncake_reverse",
            "flag": "ad-mooncake-reverse"},
           {"name": "Enzyme forward", "tag": "enzyme_forward",
            "flag": "ad-enzyme-forward"},
           {"name": "Enzyme reverse", "tag": "enzyme_reverse",
            "flag": "ad-enzyme-reverse"}]
      julia-version:
        description: 'Julia version to test on'
        required: false
        type: string
        default: '1'
      test_project:
        description: 'Project dir holding the AD suite and its runtests.jl'
        required: false
        type: string
        default: 'test/ad'
      coverage_directories:
        description: 'Directories to process for coverage (comma separated)'
        required: false
        type: string
        default: 'src,ext'
      fail_fast:
        description: >-
          Cancel remaining backends when one fails. Default false so a
          single backend break still reports the full per-backend matrix
          (we want to know every backend that regressed, not just the
          first). Set true to free runners faster during a backlog at the
          cost of that full picture.
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  ad:
    name: ${{ matrix.backend.name }}
    runs-on: ubuntu-latest
    # AD backends (esp. Enzyme) are the slowest legs; cap them so a hung
    # gradient compile is killed rather than holding a runner for hours.
    timeout-minutes: 60
    strategy:
      fail-fast: ${{ inputs.fail_fast }}
      matrix:
        backend: ${{ fromJSON(inputs.backends) }}
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - uses: julia-actions/cache@v3
      - name: Instantiate ${{ inputs.test_project }}
        run: >-
          julia --project=${{ inputs.test_project }}
          -e 'using Pkg; Pkg.instantiate()'
      - name: Run AD gradient tests
        run: |
          julia --project=${{ inputs.test_project }} --code-coverage=user \
            ${{ inputs.test_project }}/runtests.jl ${{ matrix.backend.tag }}
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: ${{ inputs.coverage_directories }}
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          flags: ${{ matrix.backend.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
