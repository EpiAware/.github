name: pre-commit

on:
  workflow_call:
    inputs:
      juliaformatter_version:
        description: 'JuliaFormatter version to pin for the formatter hook'
        required: false
        type: string
        default: '2.5.5'
      extra_args:
        description: 'Extra args passed to pre-commit run'
        required: false
        type: string
        default: '--all-files'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    # Cheap formatting/lint gate; a hung hook should die quickly.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
      - uses: julia-actions/setup-julia@v3
      - uses: julia-actions/cache@v3
      - run: >-
          julia -e 'using Pkg; Pkg.add(name="JuliaFormatter",
          version="${{ inputs.juliaformatter_version }}")'
      - run: python -m pip install pre-commit
      - run: python -m pip freeze --local
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cache/pre-commit
            ~/.cache/R/renv
          key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}
      - run: >-
          pre-commit run --show-diff-on-failure --color=always
          ${{ inputs.extra_args }}
