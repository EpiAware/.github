name: pre-commit

# Reusable pre-commit / formatting workflow for EpiAware Julia packages.
#
# Sets up Python and Julia, pins JuliaFormatter to the version the package
# formats against (so the `julia-formatter` hook does not float to the
# latest release and reformat files the rest of CI leaves alone), then runs
# pre-commit. Inlines the pre-commit invocation so no per-repo composite
# action is required.

on:
  workflow_call:
    inputs:
      juliaformatter_version:
        description: 'JuliaFormatter version to pin for the formatter hook'
        required: false
        type: string
        default: '2.5.5'
      extra_args:
        description: 'Extra args passed to pre-commit run'
        required: false
        type: string
        default: '--all-files'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: julia-actions/setup-julia@v3
      - uses: julia-actions/cache@v3
      # Pin so the `julia-formatter` pre-commit hook (which formats via the
      # global env's JuliaFormatter) matches the version the package pins;
      # otherwise it floats to the latest release and reformats files the
      # rest of the matrix leaves alone.
      - run: >-
          julia -e 'using Pkg; Pkg.add(name="JuliaFormatter",
          version="${{ inputs.juliaformatter_version }}")'
      - run: python -m pip install pre-commit
      - run: python -m pip freeze --local
      - uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pre-commit
            ~/.cache/R/renv
          key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}
      - run: >-
          pre-commit run --show-diff-on-failure --color=always
          ${{ inputs.extra_args }}
