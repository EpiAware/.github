# Configure Dependabot version updates
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Enable version updates for GitHub Actions
  # Covers the third-party actions used by `uses:` in all workflows
  # under .github/workflows/, including the reusable workflow_call
  # workflows (tests.yml, ad.yml, coverage.yml, documentation.yml, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "seabbs"
    assignees:
      - "seabbs"
    commit-message:
      prefix: "ci"
      include: "scope"
